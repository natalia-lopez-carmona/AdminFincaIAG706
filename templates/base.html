<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AdminAgro{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-brand">🌾 AdminAgro</a>
    <ul>
      <li><a href="/">Inicio</a></li>
      <li><a href="/cultivos">Cultivos</a></li>
      <li><a href="/animales">Animales</a></li>
      <li><a href="/inventario">Inventario</a></li>
      <li><a href="/labores">Labores</a></li>
      <li><a href="/gastos">Gastos</a></li>
    </ul>
  </nav>

  {% block content %}{% endblock %}

  <!-- BOTÓN CHAT -->
  <button id="chat-toggle" class="chat-toggle" title="Hablar con AgriBot">🤖</button>

  <!-- CHAT WIDGET -->
  <div id="chat-wrapper" class="chat-wrapper">
    <div class="chat-header">
      <span>🌾 AgriBot — Asistente de Finca</span>
      <button id="chat-close">✖</button>
    </div>
    <div id="chatbox">
      <div id="messages">
        <div class="msg bot">AgriBot: ¡Hola! Soy tu asistente agropecuario. ¿En qué puedo ayudarte?</div>
      </div>
      <form id="chatForm">
        <div class="chat-input-row">
          <input
            type="text"
            id="userInput"
            placeholder="Escribe tu consulta..."
            autocomplete="off"
          />
          <button type="submit" class="chat-send-btn" title="Enviar">&#10148;</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    const chatToggle = document.getElementById("chat-toggle");
    const chatWrapper = document.getElementById("chat-wrapper");
    const chatClose = document.getElementById("chat-close");

    chatToggle.addEventListener("click", () => {
      chatWrapper.style.display = "flex";
      document.getElementById("userInput").focus();
    });

    chatClose.addEventListener("click", () => {
      chatWrapper.style.display = "none";
    });
  </script>

</body>
</html>
